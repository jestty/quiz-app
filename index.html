<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Quiz App</title>
    <script src="tex-mml-chtml.js"></script>
    <link rel="apple-touch-icon" href="icon-512.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ADMIN BUTTON -->
    <div id="adminButton">
      <button onclick="openAdmin()" style="background-color: #ff9500">
        ⚙️ Admin
      </button>
    </div>
    <!-- BACK BUTTON FOR ADMIN -->
    <div id="adminBackButton" class="hidden">
      <button onclick="closeAdmin()" style="background-color: #ff9500">
        ◀ Quay lại
      </button>
    </div>
    <!-- EXAM SELECT -->
    <div id="examSelect">
      <h2>📚 Chọn kỳ thi</h2>
      <select id="examDropdown" title="Chọn kỳ thi">
        <option value="">-- Chọn kỳ thi --</option>

        <option value="33">Kỳ 33</option>

        <option value="34">Kỳ 34</option>

        <option value="35">Kỳ 35</option>

        <option value="36">Kỳ 36</option>

        <option value="37">Kỳ 37</option>

        <option value="38">Kỳ 38</option>
      </select>

      <button
        onclick="startExam()"
        style="background-color: #34c759; margin-top: 20px"
      >
        ✓ Bắt đầu
      </button>
    </div>
    <!-- USER AREA -->
    <div id="quizContainer" class="hidden">
      <h2 id="questionTitle"></h2>

      <div id="questionContent"></div>

      <div id="optionsContainer"></div>

      <button id="nextButton" onclick="nextQuestion()">➜ Câu tiếp theo</button>

      <br /><br />
      <div class="infoBar">
        <span id="progress"></span>
        <span id="score"></span>
        <span id="timer"></span>
      </div>

      <button id="backButton" class="hidden" onclick="goHome()">
        ◀ Quay lại
      </button>
    </div>

    <!-- ADMIN AREA -->
    <div id="adminPanel" class="hidden">
      <h2>⚙️ Thêm câu hỏi</h2>
      <label>Chọn kỳ thi:</label>
      <select id="adminExam" title="Chọn kỳ thi">
        <option value="33">Kỳ 33</option>
        <option value="34">Kỳ 34</option>
        <option value="35">Kỳ 35</option>
        <option value="36">Kỳ 36</option>
        <option value="37">Kỳ 37</option>
        <option value="38">Kỳ 38</option>
      </select>

      <br /><br />

      <label for="questionType">Loại câu hỏi:</label>
      <select id="questionType" onchange="changeType()">
        <option value="single">Single</option>
        <option value="group">Group</option>
      </select>

      <br /><br />

      <!-- SINGLE FORM -->
      <div id="singleForm">
        <textarea id="singleQuestion" placeholder="Nhập câu hỏi"></textarea>

        <input type="text" id="imageUrl" placeholder="Link hình ảnh (nếu có)" />

        <textarea id="singleOptions" placeholder="Mỗi đáp án 1 dòng"></textarea>

        <input
          type="number"
          id="singleAnswer"
          placeholder="Đáp án đúng (0,1,2...)"
        />
      </div>

      <!-- GROUP FORM -->
      <div id="groupForm" class="hidden">
        <input type="text" id="groupTitle" placeholder="Tiêu đề" />
        <input
          type="text"
          id="groupImage"
          placeholder="Link hình ảnh (nếu có)"
        />

        <textarea
          id="groupContent"
          placeholder="Nội dung câu hỏi (có thể ghi (1)(2))"
        ></textarea>

        <textarea
          id="groupBlanks"
          placeholder="
Ví dụ:
1|ア サンプリング,イ 抜取検査,ウ 工程管理|0
2|ア 計数データ,イ 母数,ウ 統計量|0
"
        ></textarea>
      </div>

      <br />
      <button
        onclick="generateCode()"
        style="width: 100%; background-color: #34c759"
      >
        Tạo code
      </button>

      <h3>Code tạo ra:</h3>
      <textarea
        id="outputCode"
        readonly
        placeholder="Code sẽ được tạo ra ở đây"
      ></textarea>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
